<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cool Content Journal</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Quicksand',sans-serif;
background:#f4efe6;
color:#5a4636;
}

header{
text-align:center;
padding:60px 20px;
background:#e8d8c3;
}

header h1{
font-family:'Playfair Display',serif;
font-size:42px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:#fffaf3;
padding:25px;
margin-bottom:30px;
border-radius:12px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

h2{
font-family:'Playfair Display',serif;
color:#a46c4f;
}

textarea{
width:100%;
height:90px;
border-radius:8px;
border:1px solid #ddd;
padding:10px;
background:#fdf8f2;
font-family:'Quicksand',sans-serif;
}

button{
margin-top:10px;
padding:10px 15px;
background:#c9a27e;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

button:hover{
background:#a97c5f;
}

.saved-note{
margin-top:15px;
padding:12px;
background:#f1e4d6;
border-radius:8px;
}

footer{
text-align:center;
padding:30px;
background:#e8d8c3;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>Cool Content Journal</h1>
<p>Meine Vorlesungsnotizen</p>
</header>

<div class="container">

<div class="card">
<h2>Vorlesung 1</h2>

<textarea id="note1" placeholder="Hier deine Notizen eintragen..."></textarea>
<button onclick="saveNote('note1')">Notiz speichern</button>

<div id="display1" class="saved-note"></div>

</div>


<div class="card">
<h2>Vorlesung 2</h2>

<textarea id="note2" placeholder="Hier deine Notizen eintragen..."></textarea>
<button onclick="saveNote('note2')">Notiz speichern</button>

<div id="display2" class="saved-note"></div>

</div>


<div class="card">
<h2>Vorlesung 3</h2>

<textarea id="note3" placeholder="Hier deine Notizen eintragen..."></textarea>
<button onclick="saveNote('note3')">Notiz speichern</button>

<div id="display3" class="saved-note"></div>

</div>

</div>

<footer>
<p>Cool Content Journal • Erstellt mit KI</p>
</footer>

<script>

function saveNote(id){

let text=document.getElementById(id).value;

localStorage.setItem(id,text);

let displayId="display"+id.replace("note","");

document.getElementById(displayId).innerText="Gespeicherte Notiz: "+text;

}

function loadNotes(){

for(let i=1;i<=3;i++){

let saved=localStorage.getItem("note"+i);

if(saved){

document.getElementById("display"+i).innerText="Gespeicherte Notiz: "+saved;

document.getElementById("note"+i).value=saved;

}

}

}

loadNotes();

</script>

</body>
</html>
