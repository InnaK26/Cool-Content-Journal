<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool Content Journal</title>

<style>

body{
    font-family:'Segoe UI', sans-serif;
    margin:0;
    background:#f7f8fc;
}

header{
    text-align:center;
    padding:40px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.lecture{
    background:white;
    padding:25px;
    margin-bottom:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.chapter{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#fafafa;
}

textarea{
    width:100%;
    height:90px;
    margin-top:8px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    margin-top:10px;
    margin-right:5px;
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.save{ background:#4CAF50; color:white; }
.edit{ background:#2196F3; color:white; }
.delete{ background:#f44336; color:white; }
.add{ background:#6c63ff; color:white; }

.saved{
    background:#eef1ff;
    margin-top:10px;
    padding:10px;
    border-radius:8px;
}

</style>
</head>

<body>

<header>
<h1>Cool Content Journal</h1>
<p>Interaktive Vorlesungsnotizen</p>
</header>

<div class="container" id="container"></div>

<script>

const totalLectures = 11;

// 🔹 Vorlesungen erstellen (fix 11)
function createLectures(){
    const container = document.getElementById("container");

    for(let i=1;i<=totalLectures;i++){

        let lecture = document.createElement("div");
        lecture.className="lecture";

        lecture.innerHTML = `
            <h2>Vorlesung ${i}</h2>
            <button class="add" onclick="addChapter(${i})">+ Kapitel hinzufügen</button>
            <div id="lecture_${i}"></div>
        `;

        container.appendChild(lecture);

        loadChapters(i);
    }
}

// 🔹 Kapitel erstellen
function createChapter(lecture, chapterId){

    let container = document.getElementById(`lecture_${lecture}`);
    let id = `v${lecture}_${chapterId}`;

    let div = document.createElement("div");
    div.className="chapter";
    div.id = "container_"+id;

    div.innerHTML = `
        <h3>Kapitel</h3>

        <textarea id="${id}"></textarea>

        <br>
        <button class="save" onclick="saveNote('${id}')">Speichern</button>
        <button class="edit" onclick="editNote('${id}')">Bearbeiten</button>
        <button class="delete" onclick="deleteChapter('${id}', ${lecture})">Kapitel löschen</button>

        <div id="display_${id}" class="saved"></div>
    `;

    container.appendChild(div);
}

// 🔹 Kapitel hinzufügen
function addChapter(lecture){

    let key = `lecture_${lecture}_chapters`;
    let chapters = JSON.parse(localStorage.getItem(key)) || [];

    let newId = Date.now(); // eindeutige ID

    chapters.push(newId);
    localStorage.setItem(key, JSON.stringify(chapters));

    createChapter(lecture, newId);
}

// 🔹 Kapitel löschen (komplett)
function deleteChapter(id, lecture){

    if(confirm("Kapitel wirklich löschen?")){

        // localStorage löschen
        localStorage.removeItem(id);

        // Kapitel-Liste aktualisieren
        let key = `lecture_${lecture}_chapters`;
        let chapters = JSON.parse(localStorage.getItem(key)) || [];

        chapters = chapters.filter(c => `v${lecture}_${c}` !== id);

        localStorage.setItem(key, JSON.stringify(chapters));

        // UI entfernen
        let el = document.getElementById("container_"+id);
        if(el) el.remove();
    }
}

// 🔹 Speichern
function saveNote(id){
    let text = document.getElementById(id).value;
    localStorage.setItem(id, text);
    document.getElementById("display_"+id).innerText = text;
}

// 🔹 Bearbeiten
function editNote(id){
    let saved = localStorage.getItem(id);
    if(saved){
        document.getElementById(id).value = saved;
    }
}

// 🔹 Kapitel laden
function loadChapters(lecture){

    let key = `lecture_${lecture}_chapters`;
    let chapters = JSON.parse(localStorage.getItem(key)) || [];

    chapters.forEach(chapterId=>{
        createChapter(lecture, chapterId);
    });

    setTimeout(loadNotes,100);
}

// 🔹 Notizen laden
function loadNotes(){

    let areas = document.querySelectorAll("textarea");

    areas.forEach(area=>{
        let saved = localStorage.getItem(area.id);

        if(saved){
            area.value = saved;
            document.getElementById("display_"+area.id).innerText = saved;
        }
    });
}

// 🔹 Start
createLectures();

</script>

</body>
</html>
