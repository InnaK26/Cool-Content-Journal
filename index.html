<!-- NUR DIESE FUNKTIONEN ERSETZEN -->

<script>

// 🔹 Anzeige (jetzt klickbar!)
function displayNote(id, data){
    document.getElementById("display_"+id).innerHTML = `
        <div onclick="editNote('${id}')" style="cursor:pointer;">
            <div class="author">${data.author}</div>
            <div>${data.content}</div>
            <small style="color:gray;">(Klicken zum Bearbeiten)</small>
        </div>
    `;
}

// 🔹 Bearbeiten (scrollt sogar hin)
function editNote(id){

    let saved = localStorage.getItem(id);

    if(saved){
        let data = JSON.parse(saved);

        document.getElementById(id).value = data.content;
        document.getElementById("name_"+id).value = data.author;

        // 🔥 automatisch zum Feld scrollen
        document.getElementById(id).scrollIntoView({
            behavior: "smooth",
            block: "center"
        });
    }
}

</script>
