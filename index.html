<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool Content Journal</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4efe6;
}

header{
text-align:center;
padding:40px;
background:#e8d8c3;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.lecture{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

.chapter{
margin-top:15px;
}

textarea{
width:100%;
height:80px;
margin-top:5px;
}

button{
margin-top:8px;
margin-right:5px;
padding:8px 12px;
}

.saved{
background:#f1e4d6;
margin-top:8px;
padding:10px;
border-radius:5px;
}

</style>

</head>

<body>

<header>
<h1>Cool Content Journal</h1>
<p>Vorlesungsnotizen mit editierbaren Kapiteln</p>
</header>

<div class="container">

<div class="lecture">

<h2>Vorlesung 1</h2>

<div class="chapter">

<h3>Kapitel 1</h3>

<textarea id="v1k1"></textarea>

<button onclick="saveNote('v1k1')">Speichern</button>
<button onclick="editNote('v1k1')">Bearbeiten</button>

<div id="display_v1k1" class="saved"></div>

</div>

<div class="chapter">

<h3>Kapitel 2</h3>

<textarea id="v1k2"></textarea>

<button onclick="saveNote('v1k2')">Speichern</button>
<button onclick="editNote('v1k2')">Bearbeiten</button>

<div id="display_v1k2" class="saved"></div>

</div>

</div>

</div>

<script>

function saveNote(id){

let text=document.getElementById(id).value;

localStorage.setItem(id,text);

document.getElementById("display_"+id).innerText=text;

}

function editNote(id){

let saved=localStorage.getItem(id);

if(saved){

document.getElementById(id).value=saved;

}

}

function loadNotes(){

let areas=document.querySelectorAll("textarea");

areas.forEach(function(area){

let saved=localStorage.getItem(area.id);

if(saved){

area.value=saved;
document.getElementById("display_"+area.id).innerText=saved;

}

});

}

loadNotes();

</script>

</body>

</html>
