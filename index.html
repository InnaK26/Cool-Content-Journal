<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool Content Journal</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Quicksand',sans-serif;
background:#f4efe6;
color:#5a4636;
}

header{
text-align:center;
padding:60px 20px;
background:#e8d8c3;
}

header h1{
font-family:'Playfair Display',serif;
font-size:42px;
margin-bottom:10px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:#fffaf3;
padding:25px;
margin-bottom:30px;
border-radius:12px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

h2{
font-family:'Playfair Display',serif;
color:#a46c4f;
}

textarea{
width:100%;
height:90px;
border-radius:8px;
border:1px solid #ddd;
padding:10px;
background:#fdf8f2;
font-family:'Quicksand',sans-serif;
}

button{
margin-top:10px;
padding:10px 15px;
background:#c9a27e;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

button:hover{
background:#a97c5f;
}

footer{
text-align:center;
padding:30px;
background:#e8d8c3;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>Cool Content Journal</h1>
<p>Meine Vorlesungsnotizen</p>
</header>

<div class="container">

<div class="card">
<h2>Vorlesung 1</h2>
<textarea id="note1" placeholder="Hier deine Notizen eintragen..."></textarea>
<button onclick="saveNote('note1')">Notiz speichern</button>
</div>

<div class="card">
<h2>Vorlesung 2</h2>
<textarea id="note2" placeholder="Hier deine Notizen eintragen..."></textarea>
<button onclick="saveNote('note2')">Notiz speichern</button>
</div>

<div class="card">
<h2>Vorlesung 3</h2>
<textarea id="note3" placeholder="Hier deine Notizen eintragen..."></textarea>
<button onclick="saveNote('note3')">Notiz speichern</button>
</div>

</div>

<footer>
<p>Cool Content Journal • Erstellt mit KI</p>
</footer>

<script>

function saveNote(id){
let text=document.getElementById(id).value;
localStorage.setItem(id,text);
alert("Notiz gespeichert!");
}

function loadNotes(){
let notes=["note1","note2","note3"];

notes.forEach(function(id){
let saved=localStorage.getItem(id);
if(saved){
document.getElementById(id).value=saved;
}
});
}

loadNotes();

</script>

</body>
</html>
