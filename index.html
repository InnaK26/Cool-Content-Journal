<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Vorlesungsjournal</title>
  <meta name="description" content="Ein ruhiges, modernes Journal für Vorlesungs-Zusammenfassungen – editierbar über GitHub." />

  <style>
    :root{
      --bg: #fbfbfc;
      --surface: rgba(255,255,255,.78);
      --card: rgba(255,255,255,.92);
      --text: #14151a;
      --muted: #5a6472;
      --line: rgba(20,21,26,.10);
      --accent: #3b82f6;
      --accent2: #10b981;
      --shadow: 0 10px 30px rgba(0,0,0,.06);
      --radius: 18px;
      --max: 980px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    html[data-theme="dark"]{
      --bg: #0b0d12;
      --surface: rgba(16,20,33,.55);
      --card: rgba(16,20,33,.86);
      --text: #f0f3ff;
      --muted: #a7b0c2;
      --line: rgba(240,243,255,.10);
      --accent: #60a5fa;
      --accent2: #34d399;
      --shadow: 0 12px 32px rgba(0,0,0,.35);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 18% -10%, rgba(59,130,246,.14), transparent 60%),
        radial-gradient(900px 500px at 110% 5%, rgba(16,185,129,.12), transparent 55%),
        var(--bg);
      min-height:100vh;
      line-height:1.55;
    }
    a{ color:inherit; text-decoration:none; }
    a:hover{ color: var(--accent); }

    .container{
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    /* Topbar */
    .topbar{
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    .topbarInner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 14px 0;
      gap: 12px;
    }
    .brand{
      display:inline-flex;
      align-items:center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .dot{
      width: 10px; height: 10px; border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 7px rgba(59,130,246,.16);
    }
    .nav{
      display:flex;
      align-items:center;
      gap: 10px;
      color: var(--muted);
      font-weight: 560;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn{
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      cursor:pointer;
      transition: transform .08s ease;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.ghost{
      background: transparent;
      box-shadow: none;
    }

    main{ padding: 22px 0 44px; }

    /* Hero */
    .hero{
      padding: 20px 0 10px;
    }
    h1{
      margin:0;
      font-size: clamp(1.9rem, 2.8vw, 2.6rem);
      letter-spacing: -.02em;
    }
    .subtitle{
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 75ch;
    }

    /* Controls */
    .controls{
      margin-top: 18px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .search{
      width:100%;
      padding: 14px 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      box-shadow: var(--shadow);
      outline: none;
    }
    .search:focus{
      border-color: rgba(59,130,246,.55);
      box-shadow: 0 0 0 6px rgba(59,130,246,.14), var(--shadow);
    }
    .row{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items:center;
      justify-content: space-between;
    }
    .chipRow{ display:flex; gap: 8px; flex-wrap: wrap; }
    .chip{
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--card) 92%, transparent);
      color: var(--muted);
      font-size: .92rem;
      cursor: pointer;
      user-select:none;
    }
    .chip[data-active="true"]{
      color: var(--text);
      border-color: rgba(59,130,246,.45);
      box-shadow: 0 0 0 6px rgba(59,130,246,.10);
    }
    .hint{
      color: var(--muted);
      font-size: .92rem;
    }
    .hint code{
      font-family: var(--mono);
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: color-mix(in srgb, var(--card) 85%, transparent);
    }

    /* List / Cards */
    .list{
      margin-top: 18px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .card{
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .meta{
      display:flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      align-items:center;
      color: var(--muted);
      font-size: .92rem;
    }
    .date{ font-family: var(--mono); font-size: .9rem; }
    .pill{
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--card) 90%, transparent);
    }
    .tag{ color: color-mix(in srgb, var(--muted) 85%, var(--accent)); }
    .title{
      margin: 10px 0 6px;
      font-size: 1.18rem;
      letter-spacing: -.01em;
    }
    .summary{ margin: 0; color: var(--muted); }

    .cardActions{
      display:flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
      align-items:center;
      justify-content: space-between;
    }
    .link{
      color: var(--accent);
      font-weight: 650;
    }

    /* Modal / Detail */
    dialog{
      width: min(920px, calc(100% - 24px));
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--card);
      box-shadow: 0 25px 60px rgba(0,0,0,.25);
      padding: 0;
      overflow: hidden;
    }
    dialog::backdrop{
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(3px);
    }
    .modalHeader{
      padding: 16px 16px 0;
      display:flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .modalTitle{
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: -.01em;
    }
    .modalBody{
      padding: 10px 16px 16px;
    }
    .prose h3{ margin-top: 18px; }
    .prose p{ margin: 10px 0; }
    .prose ul{ padding-left: 18px; }
    .prose code{
      font-family: var(--mono);
      font-size: .95em;
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: color-mix(in srgb, var(--card) 85%, transparent);
    }
    .media{
      margin-top: 14px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .mediaCard{
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow:hidden;
      background: #000;
      box-shadow: var(--shadow);
    }
    .mediaCard img{
      width:100%;
      height:auto;
      display:block;
      background: #111;
    }
    .mediaCard iframe, .mediaCard video{
      width:100%;
      aspect-ratio: 16 / 9;
      display:block;
    }
    .footer{
      border-top: 1px solid var(--line);
      margin-top: 30px;
      padding: 18px 0;
      color: var(--muted);
    }
    .footerInner{
      display:flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .empty{
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 18px;
      color: var(--muted);
      text-align:center;
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="container topbarInner">
      <div class="brand" aria-label="Vorlesungsjournal">
        <span class="dot" aria-hidden="true"></span>
        <span>Vorlesungsjournal</span>
      </div>

      <nav class="nav">
        <button class="btn ghost" id="resetBtn" type="button" title="Filter zurücksetzen">Zurücksetzen</button>
        <button class="btn" id="themeBtn" type="button" aria-pressed="false" title="Hell/Dunkel umschalten">☾ / ☀</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Journal für Vorlesungen</h1>
      <p class="subtitle">
        Kurze Zusammenfassungen, jederzeit editierbar. <span class="hint">Neue Einträge: im Code unter <code>lectures</code> ergänzen.</span>
      </p>

      <div class="controls">
        <input id="search" class="search" type="search" placeholder="Suche nach Titel, Kurs, Tags oder Inhalt…" autocomplete="off" />
        <div class="row">
          <div class="chipRow" id="tagChips"></div>
          <div class="hint" id="countHint"></div>
        </div>
      </div>
    </section>

    <section class="list" id="list"></section>

    <footer class="footer">
      <div class="footerInner">
        <span>© <span id="year"></span> · Vorlesungsjournal</span>
        <span>Hosting: GitHub Pages · Inhalte: HTML/JS (ohne Backend)</span>
      </div>
    </footer>
  </main>

  <dialog id="modal">
    <div class="modalHeader">
      <div>
        <h2 class="modalTitle" id="modalTitle"></h2>
        <div class="meta" id="modalMeta"></div>
      </div>
      <button class="btn" id="closeModal" type="button">Schließen</button>
    </div>
    <div class="modalBody">
      <div class="prose" id="modalContent"></div>
      <div class="media" id="modalMedia"></div>
    </div>
  </dialog>

  <script>
    /**************************************************************
     * 1) DEINE VORLESUNGEN – HIER EDITIERST DU
     * ------------------------------------------------------------
     * - Einträge hinzufügen: neues Objekt in lectures[] ergänzen
     * - Einträge löschen: Objekt entfernen
     * - Bilder/Videos: siehe Felder "images" und "videos"
     *
     * Bilder lokal:
     *   - Lege Dateien in ein Repo-Unterverzeichnis z.B. /assets/uploads/
     *   - Nutze dann z.B. "assets/uploads/bild.jpg"
     *
     * Videos:
     *   - YouTube/Vimeo: { type:"embed", url:"https://www.youtube.com/embed/ID" }
     *   - Lokale MP4:    { type:"file",  url:"assets/uploads/video.mp4" }
     **************************************************************/
    const lectures = [
      {
        id: "2026-04-23-einfuehrung",
        title: "Beispiel: Einführung in X",
        date: "2026-04-23",
        course: "Modulname / Kurs",
        tags: ["grundlagen", "beispiel"],
        summary: "Kurze Zusammenfassung in 1–2 Sätzen. Was war das Ziel der Vorlesung und was nimmst du mit?",
        content: `
          <h3>Kernaussagen</h3>
          <ul>
            <li>Punkt 1</li>
            <li>Punkt 2</li>
            <li>Punkt 3</li>
          </ul>

          <h3>Kurz-Erklärung</h3>
          <p>
            Hier kommt deine Zusammenfassung. Halte es kurz, klar und so, dass du es in 2 Wochen sofort wieder verstehst.
          </p>

          <h3>Begriffe</h3>
          <p><strong>Begriff:</strong> Erklärung.</p>

          <h3>Offene Fragen</h3>
          <ul>
            <li>Frage 1</li>
            <li>Frage 2</li>
          </ul>
        `,
        images: [
          // "assets/uploads/beispielbild.jpg"
        ],
        videos: [
          // { type: "embed", url: "https://www.youtube.com/embed/VIDEO_ID" },
          // { type: "file",  url: "assets/uploads/meinvideo.mp4" }
        ]
      },

      {
        id: "2026-04-10-datenbanken-joins",
        title: "Datenbanken: Joins verständlich",
        date: "2026-04-10",
        course: "Datenbanken 1",
        tags: ["sql", "datenbanken"],
        summary: "Inner/Left Joins und typische Fallstricke – kurz & praxisnah.",
        content: `
          <h3>Merksätze</h3>
          <ul>
            <li><strong>INNER JOIN</strong> = nur passende Zeilen beider Tabellen.</li>
            <li><strong>LEFT JOIN</strong> = alle Zeilen links + passende rechts.</li>
          </ul>

          <h3>Beispiel</h3>
          <p><code>SELECT * FROM A LEFT JOIN B ON A.id = B.a_id;</code></p>
        `,
        images: [],
        videos: []
      }
    ];

    /**************************************************************
     * 2) APP-LOGIK (Suche, Filter, Render, Modal, Theme)
     **************************************************************/
    const $ = (sel) => document.querySelector(sel);
    const listEl = $("#list");
    const searchEl = $("#search");
    const tagChipsEl = $("#tagChips");
    const countHintEl = $("#countHint");
    const yearEl = $("#year");

    const modal = $("#modal");
    const modalTitle = $("#modalTitle");
    const modalMeta = $("#modalMeta");
    const modalContent = $("#modalContent");
    const modalMedia = $("#modalMedia");
    const closeModalBtn = $("#closeModal");

    const themeBtn = $("#themeBtn");
    const resetBtn = $("#resetBtn");

    yearEl.textContent = new Date().getFullYear();

    // Theme
    (function initTheme(){
      const key = "vj-theme";
      const root = document.documentElement;
      const stored = (() => { try { return localStorage.getItem(key); } catch(e){ return null; } })();

      const systemPrefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      const initial = stored || (systemPrefersDark ? "dark" : "light");
      root.dataset.theme = initial;
      themeBtn.setAttribute("aria-pressed", initial === "dark" ? "true" : "false");

      themeBtn.addEventListener("click", () => {
        const next = (root.dataset.theme === "dark") ? "light" : "dark";
        root.dataset.theme = next;
        themeBtn.setAttribute("aria-pressed", next === "dark" ? "true" : "false");
        try { localStorage.setItem(key, next); } catch(e){}
      });
    })();

    // Helper: date formatting
    function formatDate(iso){
      const d = new Date(iso + "T00:00:00");
      return d.toLocaleDateString("de-DE", { day:"2-digit", month:"2-digit", year:"numeric" });
    }

    // Collect all tags for chips
    const allTags = Array.from(new Set(lectures.flatMap(l => l.tags || []))).sort((a,b) => a.localeCompare(b, "de"));
    let activeTag = null;

    function renderChips(){
      tagChipsEl.innerHTML = "";
      const allChip = document.createElement("span");
      allChip.className = "chip";
      allChip.textContent = "Alle";
      allChip.dataset.active = activeTag === null ? "true" : "false";
      allChip.addEventListener("click", () => { activeTag = null; applyFilters(); });
      tagChipsEl.appendChild(allChip);

      allTags.forEach(tag => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = "#" + tag;
        chip.dataset.active = (activeTag === tag) ? "true" : "false";
        chip.addEventListener("click", () => {
          activeTag = (activeTag === tag) ? null : tag;
          applyFilters();
        });
        tagChipsEl.appendChild(chip);
      });
    }

    // Render cards
    function renderList(items){
      listEl.innerHTML = "";

      if(items.length === 0){
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Keine Vorlesungen gefunden. Passe Suche/Filter an oder füge neue Einträge hinzu.";
        listEl.appendChild(empty);
        countHintEl.textContent = "";
        return;
      }

      countHintEl.textContent = `${items.length} Eintrag${items.length === 1 ? "" : "e"} angezeigt`;

      items.forEach(item => {
        const card = document.createElement("article");
        card.className = "card";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML = `
          <span class="date">${formatDate(item.date)}</span>
          ${item.course ? `<span class="pill">${escapeHtml(item.course)}</span>` : ""}
          ${(item.tags||[]).map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join("")}
        `;

        const title = document.createElement("h2");
        title.className = "title";
        title.textContent = item.title;

        const summary = document.createElement("p");
        summary.className = "summary";
        summary.textContent = item.summary || "";

        const actions = document.createElement("div");
        actions.className = "cardActions";

        const open = document.createElement("a");
        open.href = "#";
        open.className = "link";
        open.textContent = "Öffnen →";
        open.addEventListener("click", (e) => {
          e.preventDefault();
          openModal(item);
        });

        const smallInfo = document.createElement("span");
        smallInfo.className = "hint";
        const mediaCount = (item.images?.length || 0) + (item.videos?.length || 0);
        smallInfo.innerHTML = mediaCount > 0
          ? `${mediaCount} Medium/Medien`
          : `Ohne Medien`;

        actions.appendChild(open);
        actions.appendChild(smallInfo);

        card.appendChild(meta);
        card.appendChild(title);
        if(item.summary) card.appendChild(summary);
        card.appendChild(actions);

        listEl.appendChild(card);
      });
    }

    // Modal
    function openModal(item){
      modalTitle.textContent = item.title;

      modalMeta.innerHTML = `
        <span class="date">${formatDate(item.date)}</span>
        ${item.course ? `<span class="pill">${escapeHtml(item.course)}</span>` : ""}
        ${(item.tags||[]).map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join("")}
      `;

      // content is treated as HTML (you edit it above)
      modalContent.innerHTML = item.content || "";

      // media
      modalMedia.innerHTML = "";
      const images = item.images || [];
      const videos = item.videos || [];

      images.forEach(src => {
        const wrap = document.createElement("div");
        wrap.className = "mediaCard";
        const img = document.createElement("img");
        img.src = src;
        img.alt = "Bild zur Vorlesung";
        wrap.appendChild(img);
        modalMedia.appendChild(wrap);
      });

      videos.forEach(v => {
        const wrap = document.createElement("div");
        wrap.className = "mediaCard";

        if(v.type === "embed"){
          const iframe = document.createElement("iframe");
          iframe.src = v.url;
          iframe.title = "Video";
          iframe.loading = "lazy";
          iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
          iframe.allowFullscreen = true;
          wrap.appendChild(iframe);
        } else if(v.type === "file"){
          const video = document.createElement("video");
          video.controls = true;
          video.preload = "metadata";
          const source = document.createElement("source");
          source.src = v.url;
          source.type = "video/mp4";
          video.appendChild(source);
          wrap.appendChild(video);
        }

        modalMedia.appendChild(wrap);
      });

      if(typeof modal.showModal === "function") modal.showModal();
      else alert("Dein Browser unterstützt <dialog> nicht. Bitte nutze einen aktuellen Browser.");
    }

    function closeModal(){
      if(modal.open) modal.close();
    }

    closeModalBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => {
      // click outside content closes
      const rect = modal.getBoundingClientRect();
      const inDialog = (
        e.clientX >= rect.left && e.clientX <= rect.right &&
        e.clientY >= rect.top && e.clientY <= rect.bottom
      );
      if(!inDialog) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape") closeModal();
    });

    // Filtering
    function applyFilters(){
      renderChips();
      const q = (searchEl.value || "").trim().toLowerCase();

      const filtered = lectures
        .slice()
        .sort((a,b) => (a.date < b.date ? 1 : -1))
        .filter(item => {
          const matchesTag = !activeTag || (item.tags || []).includes(activeTag);
          if(!matchesTag) return false;

          if(!q) return true;
          const hay = [
            item.title,
            item.summary,
            item.course,
            (item.tags || []).join(" "),
            stripHtml(item.content || "")
          ].join(" ").toLowerCase();

          return hay.includes(q);
        });

      renderList(filtered);
    }

    searchEl.addEventListener("input", applyFilters);

    resetBtn.addEventListener("click", () => {
      activeTag = null;
      searchEl.value = "";
      applyFilters();
    });

    // Utils
    function stripHtml(html){
      const div = document.createElement("div");
      div.innerHTML = html;
      return div.textContent || div.innerText || "";
    }
    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }

    // Initial render
    renderChips();
    applyFilters();
  </script>
</body>
</html>
